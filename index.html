<!doctype html>
<html lang="en" data-mode="paper">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SylibOS — turn MIT OpenCourseWare courses into short, followable daily lessons." />
    <meta name="theme-color" content="#0e7c66" />
    <title>SylibOS</title>

    <!-- Apply saved scheme before paint to avoid a theme/accent flash -->
    <script>
      try {
        var SCHEME_MAP = {
          "reading-room": { theme: "light", accent: "#0e7c66" },
          "sandstone":    { theme: "light", accent: "#b8543a" },
          "nocturne":     { theme: "dark",  accent: "#0e7c66" },
          "velvet":       { theme: "dark",  accent: "#7c3aed" }
        };
        var s = JSON.parse(localStorage.getItem('sylibos:settings') || '{}');
        var schemeId = s.scheme || (s.theme === 'dark' ? 'nocturne' : 'reading-room');
        var scheme = SCHEME_MAP[schemeId] || SCHEME_MAP['nocturne'];
        document.documentElement.setAttribute('data-mode', scheme.theme === 'dark' ? 'dark' : 'paper');
        document.documentElement.style.setProperty('--accent', scheme.accent);
        document.documentElement.style.setProperty('--accent-base', scheme.accent);
      } catch (e) {}
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
