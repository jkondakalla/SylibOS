services:
  sylibos-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staging-sylibos-frontend
    restart: unless-stopped
    networks:
      - sylibos-net
      - nginx-staging-proxy
  sylibos-api:
    build:
      context: ./backend
    container_name: staging-sylibos-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "8004"
      DB_PATH: /data/sylibos.db
      LIBRARY_DB_PATH: /data/library.db
    volumes:
      - ${SYLIBOS_DATA_PATH:-/mnt/Luna/Backends-Staging/SylibOS-Data}:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sylibos-net
      - nginx-staging-proxy
networks:
  sylibos-net:
    name: staging-sylibos-net
  nginx-staging-proxy:
    external: true
    name: nginx-staging-proxy
